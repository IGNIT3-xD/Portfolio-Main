<!doctype html>
<html lang="en">

<head>
  <!-- Safeguard for environment window.fetch setter issue -->
  <script>
    (function () {
      try {
        var originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function () {
            return originalFetch;
          },
          set: function (val) {
            originalFetch = val;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('Unable to redefine window.fetch descriptor:', e);
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect to Font Servers -->
